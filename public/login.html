<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — FoundIt</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body class="auth-page">
<div class="auth-split">
  <div class="auth-left">
    <a href="/" class="logo">Found<span>It</span></a>
    <div class="auth-tagline">
      <h2>Welcome back.</h2>
      <p>Lost items are waiting. Help reunite them with their owners.</p>
    </div>
    <div class="auth-deco">FOUND<br/>IT</div>
  </div>
  <div class="auth-right">
    <div class="auth-form-wrap">
      <h1>Sign In</h1>
      <p class="auth-sub">New here? <a href="/register.html">Create an account</a></p>
      <div id="alertBox" class="alert hidden"></div>
      <div class="form-group">
        <label>College Email</label>
        <input type="email" id="email" placeholder="you@college.edu" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-eye">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
          <button type="button" class="eye-btn" onclick="togglePassword('password')">👁</button>
        </div>
      </div>
      <button class="btn-primary full" id="loginBtn" onclick="handleLogin()">Sign In</button>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
async function handleLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  if (!email || !password) return showAlert('Please fill in all fields.', 'error');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  const res = await api.post('/api/auth/login', { email, password });
  if (res.success) {
    const next = new URLSearchParams(location.search).get('next') || '/';
    window.location.href = next;
  } else {
    showAlert(res.message, 'error');
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
